name: Build

# Triggers: push a tag like v1.0.0, or click "Run workflow" manually in GitHub UI.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Enigma-windows
            executable: dist/Enigma.exe
          - os: macos-latest
            artifact_name: Enigma-macos
            executable: dist/Enigma.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python build/build.py

      - name: Zip the macOS .app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r Enigma-macos.zip Enigma.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/Enigma.exe
            dist/Enigma-macos.zip
          if-no-files-found: ignore
