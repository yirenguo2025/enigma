name: Build

# Triggers: push a tag like v1.0.0, or click "Run workflow" manually in GitHub UI.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(python -c "exec(open('core/version.py').read()); print(__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: python build/build.py

      - name: Zip the macOS .app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r Enigma-v${{ steps.ver.outputs.version }}-macos.zip "Enigma-v${{ steps.ver.outputs.version }}.app"

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Enigma-v${{ steps.ver.outputs.version }}-macos
          path: dist/Enigma-v${{ steps.ver.outputs.version }}-macos.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Enigma-v${{ steps.ver.outputs.version }}-windows
          path: dist/Enigma-v${{ steps.ver.outputs.version }}.exe
